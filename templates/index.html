<!DOCTYPE html>
<html>
<head>
    <title>AI Betting Pro</title>

    <style>
        body {
            background: #0b1a33;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .card {
            border-radius: 12px;
            padding: 15px;
            margin: 20px auto;
            width: 320px;
        }

        .green { border: 2px solid lime; }
        .red { border: 2px solid red; }
    </style>
</head>

<body>

<h1>🔥 AI BETTING PRO (REAL DATA)</h1>

<div id="matches"></div>

<script>

function loadMatches() {
    fetch("/matches")
    .then(res => res.json())
    .then(data => {

        const container = document.getElementById("matches");
        container.innerHTML = "";

        data.forEach(m => {

            const isGood = m.value > 0;

            const div = document.createElement("div");
            div.className = "card " + (isGood ? "green" : "red");

            div.innerHTML = `
                <h3>${m.home} vs ${m.away}</h3>

                <p>Minute: ${m.minute}</p>
                <p>Shots: ${m.shots}</p>
                <p>xG: ${m.xg}</p>

                <p>Prob: ${m.prob}%</p>

                <h3>${m.decision}</h3>

                <p>Winamax: ${m.odds.winamax || "-"}</p>
                <p>Betclic: ${m.odds.betclic || "-"}</p>
                <p>Unibet: ${m.odds.unibet || "-"}</p>

                <p>Best: ${m.best_odds}</p>

                <p style="color:${isGood ? 'lime' : 'red'}">
                    VALUE: ${m.value}
                </p>
            `;

            container.appendChild(div);
        });
    });
}

loadMatches();
setInterval(loadMatches, 60000);

</script>

</body>
</html>
