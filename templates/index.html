<!DOCTYPE html>
<html>
<head>
    <title>AI Betting Pro</title>

    <style>
        body {
            background: #0b1a33;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        #loading {
            margin-top: 20px;
            color: orange;
        }

        .card {
            border-radius: 15px;
            padding: 20px;
            margin: 20px auto;
            width: 320px;
            box-shadow: 0 0 20px rgba(0,255,200,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .green {
            border: 2px solid #00ff99;
        }

        .red {
            border: 2px solid red;
        }

        .prob {
            color: orange;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🔥 AI BETTING PRO 🔥</h1>

<div id="loading">Loading AI predictions...</div>
<div id="matches"></div>

<script>

function loadMatches() {

    document.getElementById("loading").style.display = "block";

    fetch("/matches")
    .then(res => res.json())
    .then(data => {

        const container = document.getElementById("matches");
        container.innerHTML = "";

        document.getElementById("loading").style.display = "none";

        data.forEach(m => {

            const isGreen = m.decision === "NEXT GOAL";

            const div = document.createElement("div");
            div.className = "card " + (isGreen ? "green" : "red");

            div.innerHTML = `
                <h2>${m.home} vs ${m.away}</h2>

                <p>Score: ${m.score} | ${m.minute} min</p>
                <p>Shots: ${m.shots}</p>
                <p>xG: ${m.xg}</p>

                <p class="prob">Goal Probability: ${m.prob}%</p>

                <h3 style="color:${isGreen ? '#00ff99' : 'red'}">
                    ${isGreen ? '🔥 NEXT GOAL' : '❌ NO BET'}
                </h3>

                <p>Confidence: ${m.confidence}%</p>

                <hr>

                <p>Winamax: ${m.odds.winamax}</p>
                <p>Betclic: ${m.odds.betclic}</p>
                <p>Unibet: ${m.odds.unibet}</p>

                <p>Best odds: ${m.best_odds}</p>

                <p style="color:${m.value > 0 ? 'lime' : 'red'}">
                    VALUE: ${m.value}
                </p>
            `;

            container.appendChild(div);
        });
    });
}

loadMatches();
setInterval(loadMatches, 10000);

</script>

</body>
</html>
