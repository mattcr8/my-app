<!DOCTYPE html>
<html>
<head>
    <title>AI Betting Pro</title>

    <style>
        body {
            background: #0b1a33;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .card {
            border-radius: 15px;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            box-shadow: 0 0 20px rgba(0,255,200,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .green { border: 2px solid #00ff99; }
        .red { border: 2px solid red; }

        .prob {
            color: orange;
            font-weight: bold;
        }

        .decision-green {
            color: #00ff99;
            font-size: 20px;
        }

        .decision-red {
            color: red;
            font-size: 20px;
        }
    </style>
</head>

<body>

<h1>🔥 AI BETTING PRO 🔥</h1>

<div id="matches"></div>

<script>

function loadMatches() {
    fetch("/matches")
    .then(res => res.json())
    .then(data => {

        const container = document.getElementById("matches");
        container.innerHTML = "";

        data.forEach(m => {

            const div = document.createElement("div");

            const isGreen = m.decision === "NEXT GOAL";

            div.className = "card " + (isGreen ? "green" : "red");

            div.innerHTML = `
                <h2>${m.home} vs ${m.away}</h2>
                <p>Score: ${m.score} | ${m.minute} min</p>
                <p>Shots: ${m.shots}</p>
                <p>xG: ${m.xg}</p>

                <p class="prob">Goal Probability: ${m.prob}%</p>

                <h3 class="${isGreen ? 'decision-green' : 'decision-red'}">
                    ${isGreen ? '🔥 NEXT GOAL' : '❌ NO BET'}
                </h3>

                <p>Confidence: ${m.confidence}%</p>
                <p>${m.reason}</p>
            `;

            container.appendChild(div);
        });
    });
}

// Chargement initial
loadMatches();

// Refresh auto toutes les 10 secondes
setInterval(loadMatches, 10000);

</script>

</body>
</html>
